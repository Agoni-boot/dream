<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航空梦想漂流瓶</title>
  <meta http-equiv="refresh" content="0; url=./aviation_dream_bottle.html">
  <style>
    :root {
      color-scheme: dark;
      --bg: #081126;
      --panel: rgba(13, 24, 56, 0.72);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f8f4e8;
      --subtle: rgba(248, 244, 232, 0.72);
      --accent: #ffd86c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 30%, rgba(121, 146, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #12285c 0%, #0b1737 56%, #060b18 100%);
      color: var(--text);
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
    }

    .card {
      width: min(520px, 100%);
      padding: 28px 24px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      text-align: center;
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      letter-spacing: 2px;
    }

    p {
      margin: 0;
      color: var(--subtle);
      line-height: 1.8;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      padding: 11px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe39c, #ffcf62);
      color: #5d3c02;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
  <script>
    window.location.replace("./aviation_dream_bottle.html");
  </script>
</head>
<body>
  <main class="card">
    <h1>航空梦想漂流瓶</h1>
    <p>正在进入流动的银河场景。如果页面没有自动跳转，请点击下方按钮继续打开项目主页。</p>
    <a href="./aviation_dream_bottle.html">进入项目</a>
  </main>
</body>
</html>
